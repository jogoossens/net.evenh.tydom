<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Thermometer outline: tapered stem on top, round bulb at bottom -->
  <path d="M 38 22 a 12 12 0 0 1 24 0 v 36 a 18 18 0 1 1 -24 0 z"
        fill="none" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
  <!-- Mercury bulb -->
  <circle cx="50" cy="76" r="10" fill="#000"/>
  <!-- Mercury column -->
  <rect x="46" y="30" width="8" height="48" rx="2" fill="#000"/>
  <!-- Tick marks on the stem (indicate it's a thermometer, not just a pill shape) -->
  <line x1="62" y1="32" x2="66" y2="32" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="42" x2="66" y2="42" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="52" x2="66" y2="52" stroke="#000" stroke-width="3" stroke-linecap="round"/>
</svg>
