<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- Wireless signal arcs above a house: represents a Tydom gateway broadcasting to home devices -->
  <g fill="none" stroke="#000" stroke-width="56" stroke-linecap="round">
    <path d="M 360 380 a 120 120 0 0 1 240 0"/>
    <path d="M 280 290 a 200 200 0 0 1 400 0"/>
    <path d="M 200 200 a 280 280 0 0 1 560 0"/>
  </g>
  <!-- House silhouette (the home being controlled) -->
  <path d="M 480 480 L 240 660 L 240 820 a 20 20 0 0 0 20 20 L 700 840 a 20 20 0 0 0 20 -20 L 720 660 Z"
        fill="#000" stroke="#000" stroke-width="20" stroke-linejoin="round"/>
  <!-- Door cut-out -->
  <rect x="430" y="720" width="100" height="120" rx="8" fill="#FFF"/>
</svg>
